name: Deploy Timetables App (Test + Prod)

on:
  push:
    branches:
      - main
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (current branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22.18'
          cache: 'npm'

      - name: Install dependencies and build (runner)
        run: |
          npm ci
          npm run build

      # Decide which server to deploy to (based on branch)
      - name: Select deploy environment (test vs prod)
        id: deploy_target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env_name=PROD" >> $GITHUB_OUTPUT
            echo "ssh_host=${{ secrets.PROD_SSH_HOST }}" >> $GITHUB_OUTPUT
            echo "ssh_user=${{ secrets.PROD_SSH_USERNAME }}" >> $GITHUB_OUTPUT
            echo "ssh_key<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            echo "deploy_path=/home/${{ secrets.PROD_SSH_USERNAME }}/htdocs/timetables.pjmisev.com" >> $GITHUB_OUTPUT
            echo "pm2_app_name=timetables" >> $GITHUB_OUTPUT
            echo "app_port=3000" >> $GITHUB_OUTPUT
          else
            echo "env_name=TEST" >> $GITHUB_OUTPUT
            echo "ssh_host=${{ secrets.TEST_SSH_HOST }}" >> $GITHUB_OUTPUT
            echo "ssh_user=${{ secrets.TEST_SSH_USERNAME }}" >> $GITHUB_OUTPUT
            echo "ssh_key<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.TEST_SSH_PRIVATE_KEY }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            echo "deploy_path=/home/${{ secrets.TEST_SSH_USERNAME }}/htdocs/devtables.pjmisev.com" >> $GITHUB_OUTPUT
            echo "pm2_app_name=devtables" >> $GITHUB_OUTPUT
            echo "app_port=3002" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to ${{ steps.deploy_target.outputs.env_name }} server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.deploy_target.outputs.ssh_host }}
          username: ${{ steps.deploy_target.outputs.ssh_user }}
          key: ${{ steps.deploy_target.outputs.ssh_key }}
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            if ! command -v npm >/dev/null 2>&1; then
              source ~/.bashrc || source ~/.profile
            fi

            BRANCH="${{ github.ref_name }}"
            DEPLOY_PATH="${{ steps.deploy_target.outputs.deploy_path }}"
            PM2_APP="${{ steps.deploy_target.outputs.pm2_app_name }}"
            PORT="${{ steps.deploy_target.outputs.app_port }}"

            echo "Deploying branch: $BRANCH"
            echo "Deploy path: $DEPLOY_PATH"
            echo "PM2 app: $PM2_APP"
            echo "Port: $PORT"

            cd "$DEPLOY_PATH"

            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            npm install
            npm run build

            if pm2 status "$PM2_APP" | grep -q 'online'; then
              echo "Restarting PM2 process: $PM2_APP"
              pm2 restart "$PM2_APP" --update-env
            else
              echo "Starting PM2 process: $PM2_APP"
              pm2 start node_modules/next/dist/bin/next --name "$PM2_APP" -- start -p "$PORT"
              pm2 save
            fi

            echo "Deployment complete to ${{ steps.deploy_target.outputs.env_name }}"
